<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Minimal</title>
    <style>
        :root { 
            --bg: #000; --text: #fff; --gray: #1c1c1e;
            --bkl: #82abb1; --red: #ef161e;
        }

        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #clock { font-family: monospace; font-size: 18px; opacity: 0.6; }

        /* Контейнер карты */
        .map-container { 
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center; 
        }

        .map-wrapper { position: relative; width: 300px; height: 400px; }

        /* Линии */
        .line { position: absolute; border-radius: 4px; opacity: 0.6; }
        .line-v { width: 4px; height: 100%; background: var(--bkl); left: 50%; transform: translateX(-50%); }
        .line-h { height: 4px; width: 100%; background: var(--red); top: 50%; transform: translateY(-50%); }

        /* Поезда */
        .train { position: absolute; background: #fff; border-radius: 2px; box-shadow: 0 0 10px #fff; }
        .t-v { width: 10px; height: 20px; left: 145px; animation: moveV 8s linear infinite; }
        .t-h { height: 10px; width: 20px; top: 195px; animation: moveH 12s linear infinite; }

        @keyframes moveV { 0% { top: -20px; } 100% { top: 420px; } }
        @keyframes moveH { 0% { left: -20px; } 100% { left: 320px; } }

        /* Искры в центре */
        .spark {
            position: absolute; width: 30px; height: 30px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            left: 135px; top: 185px; opacity: 0; z-index: 10;
            animation: flash 24s linear infinite; /* Синхронизация пересечения 8 и 12 */
        }
        @keyframes flash { 0%, 49%, 51%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.5); } }

        /* Станции */
        .node { 
            position: absolute; width: 12px; height: 12px; background: #000; 
            border: 3px solid; border-radius: 50%; z-index: 20; cursor: pointer;
        }
        .node-bkl { border-color: var(--bkl); }
        .node-red { border-color: var(--red); }
        
        /* Позиции станций */
        .p-park { left: 144px; top: 80px; }
        .cska { left: 144px; top: 140px; }
        .ohotny { left: 60px; top: 194px; }
        .lubyanka { left: 220px; top: 194px; }

        /* Инфо-панель */
        .info-panel { 
            background: var(--gray); padding: 25px; border-radius: 30px 30px 0 0; 
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .info-panel.active { transform: translateY(0); }
        
        h2 { margin: 0 0 10px 0; font-size: 20px; }
        p { margin: 0; opacity: 0.6; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: -1px;">METRO GO</div>
    <div id="clock">00:00:00</div>
</header>

<div class="map-container">
    <div class="map-wrapper">
        <div class="line line-v"></div>
        <div class="line line-h"></div>
        <div class="spark"></div>
        
        <div class="train t-v"></div>
        <div class="train t-h"></div>

        <div class="node node-bkl p-park" onclick="show('Петровский парк', 'Пересадка на ст. Динамо. Выход к стадиону ВТБ Арена.')"></div>
        <div class="node node-bkl cska" onclick="show('ЦСКА', 'Выход к парку Ходынское поле. Самые красивые статуи метро.')"></div>
        <div class="node node-red ohotny" onclick="show('Охотный Ряд', 'Сердце Москвы. Прямой выход к Красной площади.')"></div>
        <div class="node node-red lubyanka" onclick="show('Лубянка', 'Выход к Центральному Детскому Магазину.')"></div>
    </div>
</div>

<div id="panel" class="info-panel">
    <h2 id="st-name">Станция</h2>
    <p id="st-desc">Выберите станцию на карте для получения информации.</p>
</div>

<script>
    // Часы
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Инфо
    function show(name, desc) {
        const panel = document.getElementById('panel');
        document.getElementById('st-name').innerText = name;
        document.getElementById('st-desc').innerText = desc;
        panel.classList.add('active');

        // Голос
        const speech = new SpeechSynthesisUtterance(name);
        speech.lang = 'ru-RU';
        window.speechSynthesis.speak(speech);
        
        // Скрыть панель через 5 секунд или при клике в другое место (по желанию)
        setTimeout(() => { if(panel.classList.contains('active')) panel.classList.remove('active'); }, 6000);
    }
</script>

</body>
</html>
