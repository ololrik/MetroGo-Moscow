<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetroGo Premium</title>
    <style>
        :root { 
            --bg: #ffffff; --card: #f2f2f7; --text: #000; 
            --accent: linear-gradient(180deg, #007aff 0%, #0056b3 100%); 
            --gps-btn: linear-gradient(180deg, #34c759 0%, #248a3d 100%);
            --input: #e5e5ea; --bkl: #82abb1; --red: #ef161e; 
        }
        body.dark { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --input: #2c2c2e; }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid rgba(128,128,128,0.1); }
        #clock { font-family: 'Courier New', monospace; color: #ff9500; font-size: 18px; font-weight: bold; }

        .tab-content { flex: 1; overflow-y: auto; padding: 20px; display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Карта */
        .map-wrapper { position: relative; width: 280px; height: 320px; margin: 0 auto; background: #0a0a0a; border-radius: 24px; border: 2px solid #333; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .line-v { position: absolute; width: 5px; height: 100%; background: var(--bkl); left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px var(--bkl); }
        .line-h { position: absolute; height: 5px; width: 100%; background: var(--red); top: 50%; transform: translateY(-50%); box-shadow: 0 0 10px var(--red); }
        
        .train { position: absolute; background: #fff; border-radius: 2px; box-shadow: 0 0 15px #fff; z-index: 5; }
        .t-v { width: 10px; height: 20px; left: 135px; animation: moveV 8s linear infinite; }
        .t-h { height: 10px; width: 20px; top: 157px; animation: moveH 12s linear infinite; }
        @keyframes moveV { 0% { top: -30px; } 100% { top: 350px; } }
        @keyframes moveH { 0% { left: -30px; } 100% { left: 310px; } }

        .node { position: absolute; width: 14px; height: 14px; background: #000; border: 3px solid; border-radius: 50%; z-index: 10; cursor: pointer; transition: 0.2s; }
        .node:active { transform: scale(1.4); }
        .st-p { border-color: var(--bkl); left: 133px; top: 60px; }
        .st-o { border-color: var(--red); left: 60px; top: 153px; }

        /* Кнопки и Инпуты */
        input { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--input); color: var(--text); font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,122,255,0.3); transition: 0.2s; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        
        .timer-display { background: #000; color: #ff9500; font-family: monospace; padding: 15px; border-radius: 16px; text-align: center; font-size: 26px; margin: 15px 0; display: none; border: 2px solid #333; box-shadow: 0 0 20px rgba(255,149,0,0.2); }
        
        #result-box { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 15px; display: none; border-left: 6px solid #007aff; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .nav-bar { height: 80px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(128,128,128,0.2); padding-bottom: 10px; }
        .nav-item { text-align: center; font-size: 11px; color: #8e8e93; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: #007aff; font-weight: bold; transform: translateY(-2px); }
    </style>
</head>
<body class="dark">

<header>
    <div style="font-weight: 900; font-size: 22px; letter-spacing: -1px;">MetroGo <span style="color:#007aff">PRO</span></div>
    <div id="clock">00:00:00</div>
    <button onclick="document.body.classList.toggle('dark')" style="background:none; border:none; font-size: 24px; cursor:pointer;">🌓</button>
</header>

<div id="search-tab" class="tab-content active">
    <button class="btn" style="background: var(--gps-btn); box-shadow: 0 4px 15px rgba(52,199,89,0.3);" onclick="getLocation()">📍 Найти ближайшую по GPS</button>
    <input type="text" id="toStat" list="metro-list" placeholder="Куда вы едете?">
    <datalist id="metro-list">
        <option value="Петровский парк">
        <option value="Охотный Ряд">
        <option value="ЦСКА">
        <option value="Киевская">
        <option value="Белорусская">
    </datalist>
    <button class="btn" onclick="startTrip()">🚀 Построить маршрут</button>

    <div class="timer-display" id="timer">ПРИБЫТИЕ: <span id="time-val">00:15</span></div>

    <div id="result-box">
        <h2 id="res-name" style="margin:0; color:#007aff;"></h2>
        <p id="res-info" style="margin:12px 0; line-height: 1.5; opacity:0.8;"></p>
        <button class="btn" style="background:#5856d6; font-size:14px; box-shadow:none;" onclick="alert('Маршрут готов!')">📲 Поделиться</button>
    </div>
</div>

<div id="map-tab" class="tab-content">
    <div class="map-wrapper">
        <div class="line-v"></div>
        <div class="line-h"></div>
        <div class="train t-v"></div>
        <div class="train t-h"></div>
        <div class="node st-p" onclick="pick('Петровский парк')"></div>
        <div class="node st-o" onclick="pick('Охотный Ряд')"></div>
    </div>
    <p style="text-align:center; font-size:13px; opacity:0.5; margin-top:20px; font-weight: 500;">Интерактивная схема БКЛ и Линии 1</p>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('search-tab', this)">🔍<br>Поиск</div>
    <div class="nav-item" onclick="switchTab('map-tab', this)">🗺️<br>Карта</div>
</nav>

<script>
    const db = {
        "Петровский парк": "Переход на Динамо. Выход к стадиону ВТБ Арена.",
        "Охотный Ряд": "Выход к Манежной площади и Красной площади.",
        "Киевская": "Выход к ТЦ Европейский и вокзалу.",
        "ЦСКА": "Выход к парку Ходынское поле.",
        "Белорусская": "Выход к аэроэкспрессу и вокзалу."
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function pick(name) {
        document.getElementById('toStat').value = name;
        switchTab('search-tab', document.querySelector('.nav-item'));
        startTrip();
    }

    function startTrip() {
        const name = document.getElementById('toStat').value;
        if (!db[name]) return alert("Выберите станцию из списка");

        document.getElementById('result-box').style.display = 'block';
        document.getElementById('res-name').innerText = name;
        document.getElementById('res-info').innerText = db[name];
        
        document.getElementById('timer').style.display = 'block';
        let time = 15;
        const interval = setInterval(() => {
            time--;
            document.getElementById('time-val').innerText = `00:${time.toString().padStart(2,'0')}`;
            if (time <= 0) {
                clearInterval(interval);
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Прибытие на станцию " + name));
                if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        }, 1000);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(() => pick('Петровский парк'), () => alert("Включите GPS"));
        }
    }
</script>
</body>
</html>
